site_name: 'TF-A Toolbox'
site_description: 'CLI and Python API reference for the TF-A Toolbox'

theme:
  name: material

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.tracking

    - search.suggest
    - search.highlight

    - toc.follow
    - content.code.copy

  palette:
    - media: '(prefers-color-scheme: light)'
      scheme: default

      primary: blue grey
      accent: indigo

      toggle:
        icon: 'material/brightness-7'
        name: 'Switch to dark mode'

    - media: '(prefers-color-scheme: dark)'
      scheme: slate

      primary: blue grey
      accent: indigo

      toggle:
        icon: 'material/brightness-4'
        name: 'Switch to light mode'

nav:
  - Overview:
    - 'index.md'

    - Concepts:
      - TF-A CI Test Matrix: 'concepts/matrix.md'

  - CLI Reference: 'cli-reference.md'

plugins:
  - autorefs
  - search

  - api-autonav:
      modules: ['src/tf_a_toolbox']

  - mkdocstrings:
      handlers:
        python:
          paths: ['src']

          inventories:
            - url: 'https://docs.python.org/3/objects.inv'
              domains: ['py', 'std']

            - 'https://click.palletsprojects.com/en/stable/objects.inv'
            - 'https://rich.readthedocs.io/en/stable/objects.inv'
            - 'https://typer.tiangolo.com/objects.inv'

          options:
            docstring_section_style: list
            docstring_style: google

            merge_init_into_class: true
            members_order: source
            separate_signature: true

            show_category_heading: true
            show_root_full_path: false
            show_signature_annotations: true
            show_signature_type_parameters: true
            show_source: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true

            summary: true

            relative_crossrefs: true
            scoped_crossrefs: true
            signature_crossrefs: true

markdown_extensions:
  - admonition
  - attr_list
  - mkdocs-click

  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences

  - pymdownx.tabbed:
      alternate_style: true
