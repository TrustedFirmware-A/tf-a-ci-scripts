job_name: 'tf-a-fvp-tftf-nvm-reboot'
device_type: 'fvp'

visibility: 'public'
priority: '${LAVA_PRIORITY:-medium}'

timeouts:
  job:
    minutes: 10

actions:
  - deploy:
      to: 'fvp'

      images:
$(for artefact in "${artefacts[@]:?}"; do
	cat <<-YAML
        ${artefact:?}:
          url: '${artefact_urls[${artefact}]:?}'
	YAML

	[[ "${artefact:?}" =~ ^(busybox|rootfs)$ ]] && cat <<-YAML
          compression: gz
	YAML
done)

  - boot:
      method: 'fvp'

      docker:
        name: '${docker_name}'
        local: true

      image: '${model_dir}/${model_bin}'
      version_string: 'Fast Models [^\n]+'
      console_string: 'terminal_\w+: Listening for serial connection on port (?P<PORT>5000)'

      feedbacks:
        - 'terminal_\w+: Listening for serial connection on port (?P<NAME>(?P<PORT>5001))'
        - 'terminal_\w+: Listening for serial connection on port (?P<NAME>(?P<PORT>5002))'
        - 'terminal_\w+: Listening for serial connection on port (?P<NAME>(?P<PORT>5003))'

      arguments:
$(for boot_argument in "${boot_arguments[@]:?}"; do
	cat <<-YAML
        - $(echo "${boot_argument}" | jq -R .)
	YAML
done)

  - test:
      interactive:
        - name: 'boot-banner-0'
          prompts: ['Booting trusted firmware test framework']

          script:
            - name: 'wait-boot-banner-0'
              command:

              failures:
                - message: 'Panic:'
                  exception: 'TestError'

  - test:
      interactive:
        - name: 'new-session-0'
          prompts: ['Starting a new test session']

          script:
            - name: 'wait-new-session-0'
              command:

              failures:
                - message: 'Resuming interrupted test session'
                  exception: 'TestError'

                - message: 'Panic:'
                  exception: 'TestError'

  - test:
      interactive:
        - name: 'resume-after-system-reset'
          prompts: ['Resuming interrupted test session']

          script:
            - name: 'wait-resume-after-system-reset'
              command:

              failures:
                - message: 'Starting a new test session'
                  exception: 'TestError'

                - message: 'Panic:'
                  exception: 'TestError'

  - test:
      interactive:
        - name: 'resume-after-psci-stat-reset'
          prompts: ['Resuming interrupted test session']

          script:
            - name: 'wait-resume-after-psci-stat-reset'
              command:

              failures:
                - message: 'Starting a new test session'
                  exception: 'TestError'

                - message: 'Panic:'
                  exception: 'TestError'

  - test:
      interactive:
        - name: 'psci-stat-shutdown-start'
          prompts: ["> Executing 'for stats after system shutdown'"]

          script:
            - name: 'wait-psci-stat-shutdown-start'
              command:

              failures:
                - message: 'Panic:'
                  exception: 'TestError'

                - message: 'Exiting tests\.'
                  exception: 'TestError'

  - test:
      connection-namespace: '5001'

      interactive:
        - name: 'power-down-after-psci-stat-shutdown'
          prompts: ['Connection closed by foreign host\.']

          script:
            - name: 'wait-power-down-after-psci-stat-shutdown'
              command:

  - boot:
      method: 'fvp'
      docker:
        name: '${docker_name}'
        local: true

      image: '${model_dir}/${model_bin}'
      version_string: 'Fast Models [^\n]+'
      console_string: 'terminal_\w+: Listening for serial connection on port (?P<PORT>5000)'

      feedbacks:
        - 'terminal_\w+: Listening for serial connection on port (?P<NAME>(?P<PORT>5001))'
        - 'terminal_\w+: Listening for serial connection on port (?P<NAME>(?P<PORT>5002))'
        - 'terminal_\w+: Listening for serial connection on port (?P<NAME>(?P<PORT>5003))'

      arguments:
$(for boot_argument in "${boot_arguments[@]:?}"; do
	cat <<-YAML
        - $(echo "${boot_argument}" | sed 's/{FIP}/{FLASH0}/' | jq -R .)
	YAML
done)

  - test:
